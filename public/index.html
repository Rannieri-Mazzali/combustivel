<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FleetFuel - Gestão de Abastecimento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../src/css/styles.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <!-- Firebase Config -->
    <script src="../src/js/firebase-config.js"></script>
    
    <!-- Modules -->
    <script src="../src/js/modules/utils.js"></script>
    <script src="../src/js/modules/auth.js"></script>
    <script src="../src/js/modules/vehicle.js"></script>
    <script src="../src/js/modules/refuel.js"></script>
    <script src="../src/js/modules/email.js"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900">
    <div class="min-h-screen flex items-center justify-center">
    <div class="min-h-screen flex items-center justify-center">
        <div class="text-center">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-blue-500 to-blue-600 rounded-full mb-6">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
            </div>
            <h1 class="text-4xl font-bold text-white mb-2">FleetFuel</h1>
            <p class="text-slate-400 mb-8">Carregando sua aplicação...</p>
            <div class="flex justify-center">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500"></div>
            </div>
        </div>
    </div>

    <script>
        // Redirecionar para dashboard assim que a página carregar
        window.addEventListener('load', function() {
            setTimeout(function() {
                window.location.href = 'dashboard.html';
            }, 800);
        });
        
        // Fallback se a página não carregar em tempo hábil
        setTimeout(function() {
            window.location.href = 'dashboard.html';
        }, 3000);
    </script>
</body>
</html>
