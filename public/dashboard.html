<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SilverControl - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/src/css/styles.css">
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900">
    <div class="min-h-screen">
        <!-- Navbar -->
        <nav class="bg-slate-800 border-b border-slate-700 sticky top-0 z-40">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center h-16">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-blue-600 rounded-lg flex items-center justify-center">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                            </svg>
                        </div>
                        <h1 class="text-xl font-bold text-white">SilverControl</h1>
                    </div>

                    <div class="flex items-center space-x-4">
                        <button onclick="navigateTo('fuel-depot.html')" class="text-slate-300 hover:text-white px-3 py-2 rounded-lg transition">
                            ⛽ Depósito
                        </button>
                        <button onclick="navigateTo('history.html')" class="text-slate-300 hover:text-white px-3 py-2 rounded-lg transition">
                            Histórico
                        </button>
                        <button onclick="navigateTo('vehicles.html')" class="text-slate-300 hover:text-white px-3 py-2 rounded-lg transition">
                            Veículos
                        </button>
                        <div class="relative group">
                            <button class="text-slate-300 hover:text-white px-3 py-2 rounded-lg transition flex items-center space-x-1">
                                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path>
                                </svg>
                                <span id="user-name">Usuário</span>
                            </button>
                            <div class="hidden group-hover:block absolute right-0 mt-0 w-48 bg-slate-700 rounded-lg shadow-lg">
                                <button onclick="handleLogout()" class="block w-full text-left px-4 py-2 text-slate-300 hover:text-white hover:bg-slate-600 transition">
                                    Sair
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <!-- Header -->
            <div class="mb-8">
                <h2 class="text-3xl font-bold text-white mb-2">Novo Abastecimento</h2>
                <p class="text-slate-400">Registre um novo abastecimento para sua frota</p>
            </div>

            <!-- Main Grid -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Form Section -->
                <div class="lg:col-span-2">
                    <div class="bg-slate-800 rounded-lg shadow-2xl p-8 border border-slate-700">
                        <form onsubmit="handleRefuelSubmit(event)" class="space-y-6">
                            <!-- Vehicle Selection -->
                            <div>
                                <label class="block text-sm font-medium text-slate-300 mb-3">Selecione o Veículo</label>
                                <select 
                                    id="vehicle-select"
                                    class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500 focus:ring-opacity-20"
                                    required
                                >
                                    <option value="">Carregando veículos...</option>
                                </select>
                                <button 
                                    type="button"
                                    onclick="navigateTo('vehicles.html')"
                                    class="mt-2 text-blue-500 hover:text-blue-400 text-sm font-semibold"
                                >
                                    + Adicionar novo veículo
                                </button>
                            </div>

                            <!-- Grid 2 Columns -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <!-- KM -->
                                <div>
                                    <label class="block text-sm font-medium text-slate-300 mb-2">Quilometragem (km)</label>
                                    <input 
                                        type="number" 
                                        id="refuel-km" 
                                        placeholder="45250"
                                        step="0.01"
                                        class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500 focus:ring-opacity-20"
                                        required
                                    >
                                </div>

                                <!-- Liters -->
                                <div>
                                    <label class="block text-sm font-medium text-slate-300 mb-2">Litros</label>
                                    <input 
                                        type="number" 
                                        id="refuel-liters" 
                                        placeholder="150"
                                        step="0.01"
                                        min="0"
                                        class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500 focus:ring-opacity-20"
                                        required
                                    >
                                </div>
                            </div>

                            <!-- Grid 2 Columns -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <!-- Date -->
                                <div>
                                    <label class="block text-sm font-medium text-slate-300 mb-2">Data</label>
                                    <input 
                                        type="date" 
                                        id="refuel-date" 
                                        class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500 focus:ring-opacity-20"
                                        required
                                    >
                                </div>

                                <!-- Time -->
                                <div>
                                    <label class="block text-sm font-medium text-slate-300 mb-2">Hora</label>
                                    <input 
                                        type="time" 
                                        id="refuel-time" 
                                        class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500 focus:ring-opacity-20"
                                        required
                                    >
                                </div>
                            </div>

                            <!-- Grid 2 Columns -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <!-- Cost -->
                                <div>
                                    <label class="block text-sm font-medium text-slate-300 mb-2">Custo (R$)</label>
                                    <input 
                                        type="number" 
                                        id="refuel-cost" 
                                        placeholder="0.00"
                                        step="0.01"
                                        min="0"
                                        class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500 focus:ring-opacity-20"
                                    >
                                </div>

                                <!-- Fuel Type -->
                                <div>
                                    <label class="block text-sm font-medium text-slate-300 mb-2">Tipo de Combustível</label>
                                    <select 
                                        id="refuel-type"
                                        class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500 focus:ring-opacity-20"
                                    >
                                        <option value="Diesel">Diesel</option>
                                        <option value="Gasolina">Gasolina</option>
                                        <option value="Etanol">Etanol</option>
                                        <option value="GNV">GNV</option>
                                    </select>
                                </div>
                            </div>

                            <!-- Location -->
                            <div>
                                <label class="block text-sm font-medium text-slate-300 mb-2">Local do Abastecimento</label>
                                <input 
                                    type="text" 
                                    id="refuel-location" 
                                    placeholder="Posto de gasolina ou local"
                                    class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500 focus:ring-opacity-20"
                                >
                            </div>

                            <!-- Notes -->
                            <div>
                                <label class="block text-sm font-medium text-slate-300 mb-2">Observações</label>
                                <textarea 
                                    id="refuel-notes" 
                                    placeholder="Adicione notas adicionais..."
                                    rows="4"
                                    class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500 focus:ring-opacity-20"
                                ></textarea>
                            </div>

                            <!-- Submit Button -->
                            <div class="flex gap-4">
                                <button 
                                    type="submit"
                                    class="flex-1 py-3 px-6 bg-gradient-to-r from-blue-500 to-blue-600 text-white font-semibold rounded-lg hover:from-blue-600 hover:to-blue-700 transition duration-200 transform hover:scale-105"
                                >
                                    Registrar Abastecimento
                                </button>
                                <button 
                                    type="button"
                                    onclick="resetForm()"
                                    class="flex-1 py-3 px-6 bg-slate-700 text-slate-300 font-semibold rounded-lg hover:bg-slate-600 transition duration-200"
                                >
                                    Limpar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Stats Section -->
                <div class="space-y-6">
                    <!-- Quick Stats -->
                    <div class="bg-slate-800 rounded-lg shadow-2xl p-6 border border-slate-700">
                        <h3 class="text-lg font-bold text-white mb-4">Estatísticas Rápidas</h3>
                        
                        <div class="space-y-4">
                            <div class="bg-gradient-to-br from-blue-500 to-blue-600 rounded-lg p-4">
                                <p class="text-blue-100 text-sm">Total de Veículos</p>
                                <p class="text-white text-3xl font-bold" id="total-vehicles">0</p>
                            </div>

                            <div class="bg-gradient-to-br from-green-500 to-green-600 rounded-lg p-4">
                                <p class="text-green-100 text-sm">Último Abastecimento</p>
                                <p class="text-white text-2xl font-bold" id="last-refuel">-</p>
                            </div>

                            <div class="bg-gradient-to-br from-purple-500 to-purple-600 rounded-lg p-4">
                                <p class="text-purple-100 text-sm">Litros (Mês)</p>
                                <p class="text-white text-2xl font-bold" id="liters-month">0</p>
                            </div>

                            <div class="bg-gradient-to-br from-orange-500 to-orange-600 rounded-lg p-4">
                                <p class="text-orange-100 text-sm">Custo (Mês)</p>
                                <p class="text-white text-2xl font-bold" id="cost-month">R$ 0</p>
                            </div>
                        </div>
                    </div>

                    <!-- Recent Activity -->
                    <div class="bg-slate-800 rounded-lg shadow-2xl p-6 border border-slate-700">
                        <h3 class="text-lg font-bold text-white mb-4">Últimos Abastecimentos</h3>
                        <div id="recent-refuels" class="space-y-3">
                            <p class="text-slate-400 text-sm">Carregando...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- End of content -->

    <!-- Storage Module -->
    <script src="/src/js/storage.js"></script>
    
    <!-- Modules -->
    <script src="/src/js/modules/utils.js"></script>
    <script src="/src/js/modules/auth.js"></script>
    <script src="/src/js/modules/vehicle.js"></script>
    <script src="/src/js/modules/refuel.js"></script>
    
    <!-- Page Scripts -->
    <script src="/src/js/pages/dashboard.js"></script>
</body>
</html>
