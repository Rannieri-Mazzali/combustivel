<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Veículos - FleetFuel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../src/css/styles.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900">
    <div class="min-h-screen">
        <!-- Navbar -->
        <nav class="bg-slate-800 border-b border-slate-700 sticky top-0 z-40">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center h-16">
                    <div class="flex items-center space-x-3">
                        <button onclick="navigateTo('dashboard.html')" class="w-10 h-10 bg-gradient-to-br from-blue-500 to-blue-600 rounded-lg flex items-center justify-center hover:shadow-lg transition">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                            </svg>
                        </button>
                        <h1 class="text-xl font-bold text-white">FleetFuel</h1>
                    </div>

                    <div class="flex items-center space-x-4">
                        <button onclick="navigateTo('fuel-depot.html')" class="text-slate-300 hover:text-white px-3 py-2 rounded-lg transition">
                            ⛽ Depósito
                        </button>
                        <button onclick="navigateTo('dashboard.html')" class="text-slate-300 hover:text-white px-3 py-2 rounded-lg transition">
                            Dashboard
                        </button>
                        <button onclick="navigateTo('history.html')" class="text-slate-300 hover:text-white px-3 py-2 rounded-lg transition">
                            Histórico
                        </button>
                        <div class="relative group">
                            <button class="text-slate-300 hover:text-white px-3 py-2 rounded-lg transition flex items-center space-x-1">
                                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path>
                                </svg>
                                <span id="user-name">Usuário</span>
                            </button>
                            <div class="hidden group-hover:block absolute right-0 mt-0 w-48 bg-slate-700 rounded-lg shadow-lg">
                                <button onclick="handleLogout()" class="block w-full text-left px-4 py-2 text-slate-300 hover:text-white hover:bg-slate-600 transition">
                                    Sair
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <!-- Header -->
            <div class="mb-8">
                <h2 class="text-3xl font-bold text-white mb-2">Gerenciar Veículos</h2>
                <p class="text-slate-400">Adicione e gerencie os veículos da sua frota</p>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Add Vehicle Form -->
                <div class="lg:col-span-1">
                    <div class="bg-slate-800 rounded-lg shadow-2xl p-8 border border-slate-700 sticky top-24">
                        <h3 class="text-2xl font-bold text-white mb-6">Novo Veículo</h3>
                        <form onsubmit="handleAddVehicle(event)" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-300 mb-2">Placa</label>
                                <input 
                                    type="text" 
                                    id="vehicle-plate" 
                                    placeholder="ABC-1234"
                                    maxlength="8"
                                    class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500 focus:ring-opacity-20"
                                    required
                                >
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-slate-300 mb-2">Modelo</label>
                                <input 
                                    type="text" 
                                    id="vehicle-model" 
                                    placeholder="Scania R440"
                                    class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500 focus:ring-opacity-20"
                                    required
                                >
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-slate-300 mb-2">Ano</label>
                                <input 
                                    type="number" 
                                    id="vehicle-year" 
                                    placeholder="2024"
                                    min="2000"
                                    max="2100"
                                    class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500 focus:ring-opacity-20"
                                    required
                                >
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-slate-300 mb-2">Capacidade do Tanque (litros)</label>
                                <input 
                                    type="number" 
                                    id="vehicle-capacity" 
                                    placeholder="300"
                                    step="0.01"
                                    min="0"
                                    class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500 focus:ring-opacity-20"
                                    required
                                >
                            </div>

                            <button 
                                type="submit"
                                class="w-full py-3 px-6 bg-gradient-to-r from-green-500 to-green-600 text-white font-semibold rounded-lg hover:from-green-600 hover:to-green-700 transition duration-200 transform hover:scale-105"
                            >
                                Adicionar Veículo
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Vehicles List -->
                <div class="lg:col-span-2">
                    <div id="vehicles-container" class="space-y-4">
                        <div class="bg-slate-800 rounded-lg shadow-2xl p-8 border border-slate-700 text-center">
                            <p class="text-slate-400">Carregando veículos...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal para editar veículo -->
    <div id="edit-vehicle-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-slate-800 rounded-lg shadow-2xl p-8 max-w-md w-full border border-slate-700">
            <h3 class="text-2xl font-bold text-white mb-6">Editar Veículo</h3>
            <form onsubmit="saveVehicleEdit(event)" class="space-y-4">
                <input type="hidden" id="edit-vehicle-id">
                
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Modelo</label>
                    <input 
                        type="text" 
                        id="edit-vehicle-model"
                        class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white"
                        required
                    >
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Capacidade do Tanque (litros)</label>
                    <input 
                        type="number" 
                        id="edit-vehicle-capacity"
                        step="0.01"
                        class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white"
                        required
                    >
                </div>

                <div class="flex gap-4">
                    <button 
                        type="submit"
                        class="flex-1 py-2 px-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition"
                    >
                        Salvar
                    </button>
                    <button 
                        type="button"
                        onclick="closeEditVehicleModal()"
                        class="flex-1 py-2 px-4 bg-slate-700 hover:bg-slate-600 text-white font-semibold rounded-lg transition"
                    >
                        Cancelar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase Config -->
    <script src="/src/js/firebase-config.js"></script>
    
    <!-- Modules -->
    <script src="/src/js/modules/utils.js"></script>
    <script src="/src/js/modules/auth.js"></script>
    <script src="/src/js/modules/vehicle.js"></script>
    <script src="/src/js/modules/refuel.js"></script>
    <script src="/src/js/modules/email.js"></script>
    
    <!-- Page Scripts -->
    <script src="/src/js/pages/vehicles.js"></script>
</body>
</html>
